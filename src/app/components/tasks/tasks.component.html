<div class="tasks-container">
  <div class="tasks-header">
    <h1>Mis Tareas</h1>
    <button (click)="navigateToCreateTask()" class="btn btn-primary">
      <i class="fas fa-plus"></i> Nueva Tarea
    </button>
  </div>

  <div class="tasks-grid">
    <div class="task-column">
      <h2 class="section-title">
        <i class="fas fa-calendar-day"></i> Tareas de Hoy
      </h2>
      <div class="task-scroll-container">
        <app-today-tasks></app-today-tasks>
      </div>
    </div>
    <div class="task-column">
      <h2 class="section-title">
        <i class="fas fa-tasks"></i> Todas las Tareas
      </h2>
      <div class="task-scroll-container">
        <app-extra-tasks></app-extra-tasks>
      </div>
    </div>
  </div>
</div>
