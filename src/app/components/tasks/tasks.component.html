<div class="tasks-container">
  <div class="tasks-header">
    <h1>Mis Tareas</h1>
    <button (click)="navigateToCreateTask()" class="btn btn-primary">
      <i class="fas fa-plus"></i> Nueva Tarea
    </button>
  </div>

  <div class="tabs">
    <button 
      class="tab-btn" 
      [class.active]="activeTab === 'today'"
      (click)="setActiveTab('today')">
      <i class="fas fa-calendar-day"></i> Hoy
    </button>
    <button 
      class="tab-btn" 
      [class.active]="activeTab === 'extra'"
      (click)="setActiveTab('extra')">
      <i class="fas fa-tasks"></i> Todas las tareas
    </button>
  </div>

  <div class="tab-content">
    <div *ngIf="activeTab === 'today'" class="tab-pane">
      <app-today-tasks></app-today-tasks>
    </div>
    <div *ngIf="activeTab === 'extra'" class="tab-pane">
      <app-extra-tasks></app-extra-tasks>
    </div>
  </div>
</div>
