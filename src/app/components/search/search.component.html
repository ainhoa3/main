<div class="search-container">
  <div class="search-header">
    <input
      type="text"
      [(ngModel)]="searchTerm"
      (input)="search()"
      class="search-input"
      placeholder="Buscar tareas y hábitos..."
      [ngClass]="{ 'has-search': hasSearched }"
    >
    <button *ngIf="hasSearched" (click)="clearSearch()" class="clear-button">
      <fa-icon [icon]="faTimes"></fa-icon>
    </button>
  </div>

  <div class="results-container" *ngIf="hasSearched">
    <div class="results-section" *ngIf="tasks.length > 0">
      <h3>Tareas</h3>
      <div class="task-list">
        <div
          *ngFor="let task of tasks"
          class="task-item"
          [ngClass]="{ 'task-done': task.done }"
          (click)="openTaskDetail(task)"
        >
          <fa-icon [icon]="faCheck" *ngIf="task.done" class="done-icon"></fa-icon>
          <fa-icon [icon]="faTimes" *ngIf="!task.done" class="pending-icon"></fa-icon>
          <span class="task-title">{{ task.title }}</span>
          <span class="task-priority" [ngClass]="getPriorityClass(task)">
            {{ getTaskPriority(task) }}
          </span>
          <span class="task-environment">
            {{ getEnvironmentString(task.environment) }}
          </span>
          <span class="task-date">
            {{ getTaskDate(task) }}
          </span>
        </div>
      </div>
    </div>

    <div class="results-section" *ngIf="habits.length > 0">
      <h3>Hábitos</h3>
      <div class="habit-list">
        <div
          *ngFor="let habit of habits"
          class="habit-item"
          [ngClass]="{ 'habit-done': habit.done }"
          (click)="openHabitDetail(habit)"
        >
          <fa-icon [icon]="faCheck" *ngIf="habit.done" class="done-icon"></fa-icon>
          <fa-icon [icon]="faTimes" *ngIf="!habit.done" class="pending-icon"></fa-icon>
          <span class="habit-title">{{ habit.title }}</span>
          <span class="habit-programm-days">
            {{ habit.programmDays }} días
          </span>
          <span class="habit-last-day">
            Último día: {{ getHabitDate(habit) }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <div class="no-results" *ngIf="hasSearched && tasks.length === 0 && habits.length === 0">
    <p>No se encontraron resultados para "{{ searchTerm }}"</p>
  </div>

  <ng-template #modalContent>
    <div class="modal-header">
      <h4 class="modal-title">Editar Hábito</h4>
      <button type="button" class="btn-close" (click)="closeHabitModal()"></button>
    </div>
    <div class="modal-body">
      <form [formGroup]="habitForm" (ngSubmit)="saveHabit()">
        <div class="form-group">
          <label for="title">Título</label>
          <input
            type="text"
            id="title"
            formControlName="title"
            class="form-control"
            required
          >
        </div>
        <div class="form-group">
          <label for="description">Descripción</label>
          <textarea
            id="description"
            formControlName="description"
            class="form-control"
          ></textarea>
        </div>
        <div class="form-group">
          <label for="programmDays">Días Programados</label>
          <input
            type="number"
            id="programmDays"
            formControlName="programmDays"
            class="form-control"
          >
        </div>
        <div class="form-group">
          <label for="lastDay">Último Día</label>
          <input
            type="date"
            id="lastDay"
            formControlName="lastDay"
            class="form-control"
            required
          >
        </div>
        <div class="form-group">
          <label class="switch">
            <input type="checkbox" formControlName="done">
            <span class="slider"></span>
          </label>
          <span class="done-label">Hecho</span>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button
        type="button"
        class="btn btn-secondary"
        (click)="cancelEdit()"
      >
        Cancelar
      </button>
      <button
        type="button"
        class="btn btn-primary"
        [disabled]="!habitForm.valid"
        (click)="saveHabit()"
      >
        Guardar
      </button>
    </div>
  </ng-template>
</div>
